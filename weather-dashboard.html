<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .search-input {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .search-btn {
            padding: 12px 30px;
            background: white;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .location-btn {
            padding: 12px 30px;
            background: white;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .location-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .error-message {
            background: rgba(255, 71, 87, 0.9);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .weather-content {
            display: none;
        }

        .weather-content.show {
            display: block;
        }

        .current-weather {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            color: white;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .location-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .location-info h2 {
            font-size: 2rem;
        }

        .last-update {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .weather-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0;
            flex-wrap: wrap;
            gap: 30px;
        }

        .temperature-section {
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }

        .weather-icon {
            font-size: 5rem;
            line-height: 1;
        }

        .temperature-info h1 {
            font-size: 4rem;
            font-weight: 300;
            margin: 0;
        }

        .weather-description {
            font-size: 1.5rem;
            opacity: 0.9;
            text-transform: capitalize;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .detail-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detail-label {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .detail-value {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .forecast-section {
            margin-top: 30px;
        }

        .forecast-title {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .forecast-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .forecast-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
        }

        .forecast-day {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .forecast-icon {
            font-size: 2rem;
            margin: 10px 0;
        }

        .forecast-temp {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
            margin: 10px 0;
        }

        .forecast-high {
            font-weight: 600;
        }

        .forecast-low {
            opacity: 0.7;
        }

        .forecast-condition {
            font-size: 0.8rem;
            opacity: 0.8;
            text-transform: capitalize;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .current-weather {
                padding: 20px;
            }

            .weather-main {
                flex-direction: column;
            }

            .temperature-section {
                flex-direction: row;
                justify-content: center;
            }

            .temperature-info h1 {
                font-size: 3rem;
            }

            .weather-icon {
                font-size: 3rem;
            }

            .search-section {
                flex-direction: column;
            }

            .search-input {
                max-width: 100%;
            }

            .forecast-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get real-time weather information for any location</p>
        </header>

        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                class="search-input" 
                placeholder="Enter city name..." 
                autocomplete="off"
            >
            <button class="search-btn" onclick="searchWeather()">Search</button>
            <button class="location-btn" onclick="getLocationWeather()">📍 Use My Location</button>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <div id="weatherContent" class="weather-content">
            <!-- Current Weather -->
            <div class="current-weather">
                <div class="location-info">
                    <h2 id="locationName"></h2>
                    <span class="last-update">Last updated: <span id="lastUpdate"></span></span>
                </div>

                <div class="weather-main">
                    <div class="temperature-section">
                        <div class="weather-icon" id="weatherIcon"></div>
                        <div class="temperature-info">
                            <h1 id="temperature"></h1>
                            <div class="weather-description" id="description"></div>
                        </div>
                    </div>

                    <div class="weather-details">
                        <div class="detail-card">
                            <div class="detail-label">Feels Like</div>
                            <div class="detail-value" id="feelsLike"></div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-label">Humidity</div>
                            <div class="detail-value" id="humidity"></div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-label">Pressure</div>
                            <div class="detail-value" id="pressure"></div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-label">Wind Speed</div>
                            <div class="detail-value" id="windSpeed"></div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-label">UV Index</div>
                            <div class="detail-value" id="uvIndex"></div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-label">Visibility</div>
                            <div class="detail-value" id="visibility"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 5-Day Forecast -->
            <div class="forecast-section">
                <h3 class="forecast-title">5-Day Forecast</h3>
                <div class="forecast-grid" id="forecastGrid"></div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'b6fd43b52d41a3b3951ba2d66837615f'; // Using OpenWeatherMap free tier
        const WEATHER_API = 'https://api.openweathermap.org/data/2.5';

        // Weather icon mapping
        const iconMap = {
            '01d': '☀️', '01n': '🌙',
            '02d': '⛅', '02n': '🌤️',
            '03d': '☁️', '03n': '☁️',
            '04d': '☁️', '04n': '☁️',
            '09d': '🌧️', '09n': '🌧️',
            '10d': '🌦️', '10n': '🌧️',
            '11d': '⛈️', '11n': '⛈️',
            '13d': '❄️', '13n': '❄️',
            '50d': '🌫️', '50n': '🌫️'
        };

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            document.getElementById('weatherContent').classList.remove('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        async function fetchWeather(lat, lon) {
            try {
                showLoading(true);
                hideError();

                const response = await fetch(
                    `${WEATHER_API}/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
                );

                if (!response.ok) {
                    throw new Error('Weather data not found');
                }

                const data = await response.json();
                displayWeather(data);
                showLoading(false);
            } catch (error) {
                showError('Error fetching weather data: ' + error.message);
                showLoading(false);
            }
        }

        async function searchWeather() {
            const city = document.getElementById('searchInput').value.trim();
            if (!city) {
                showError('Please enter a city name');
                return;
            }

            try {
                showLoading(true);
                hideError();

                const response = await fetch(
                    `https://api.openweathermap.org/geo/1.0/direct?q=${city}&limit=1&appid=${API_KEY}`
                );

                if (!response.ok) throw new Error('City not found');

                const geoData = await response.json();
                if (geoData.length === 0) {
                    throw new Error('City not found');
                }

                const { lat, lon } = geoData[0];
                fetchWeather(lat, lon);
            } catch (error) {
                showError('Error: ' + error.message);
                showLoading(false);
            }
        }

        function getLocationWeather() {
            if (!navigator.geolocation) {
                showError('Geolocation is not supported by your browser');
                return;
            }

            showLoading(true);
            navigator.geolocation.getCurrentPosition(
                position => {
                    const { latitude, longitude } = position.coords;
                    fetchWeather(latitude, longitude);
                },
                error => {
                    showError('Error getting location: ' + error.message);
                    showLoading(false);
                }
            );
        }

        function displayWeather(data) {
            const city = data.city;
            const current = data.list[0];

            // Current weather
            document.getElementById('locationName').textContent = `${city.name}, ${city.country}`;
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
            document.getElementById('temperature').textContent = `${Math.round(current.main.temp)}°C`;
            document.getElementById('feelsLike').textContent = `${Math.round(current.main.feels_like)}°C`;
            document.getElementById('description').textContent = current.weather[0].main;
            document.getElementById('humidity').textContent = `${current.main.humidity}%`;
            document.getElementById('pressure').textContent = `${current.main.pressure} mb`;
            document.getElementById('windSpeed').textContent = `${(current.wind.speed * 3.6).toFixed(1)} km/h`;
            document.getElementById('visibility').textContent = `${(current.visibility / 1000).toFixed(1)} km`;
            document.getElementById('uvIndex').textContent = current.clouds ? `${current.clouds}%` : 'N/A';

            const iconCode = current.weather[0].icon;
            document.getElementById('weatherIcon').textContent = iconMap[iconCode] || '🌤️';

            // 5-day forecast
            const dailyForecasts = {};
            data.list.forEach(item => {
                const date = new Date(item.dt * 1000);
                const day = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

                if (!dailyForecasts[day]) {
                    dailyForecasts[day] = {
                        temps: [],
                        weather: item.weather[0],
                        date: date
                    };
                }
                dailyForecasts[day].temps.push(item.main.temp);
            });

            const forecastGrid = document.getElementById('forecastGrid');
            forecastGrid.innerHTML = '';

            Object.entries(dailyForecasts).slice(0, 5).forEach(([day, data]) => {
                const minTemp = Math.min(...data.temps);
                const maxTemp = Math.max(...data.temps);
                const iconCode = data.weather.icon;

                const card = document.createElement('div');
                card.className = 'forecast-card';
                card.innerHTML = `
                    <div class="forecast-day">${day}</div>
                    <div class="forecast-icon">${iconMap[iconCode] || '🌤️'}</div>
                    <div class="forecast-temp">
                        <span class="forecast-high">${Math.round(maxTemp)}°</span>
                        <span class="forecast-low">${Math.round(minTemp)}°</span>
                    </div>
                    <div class="forecast-condition">${data.weather.main}</div>
                `;
                forecastGrid.appendChild(card);
            });

            document.getElementById('weatherContent').classList.add('show');
        }

        // Allow Enter key to search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });

        // Load default city on page load
        window.addEventListener('load', () => {
            searchWeather();
            document.getElementById('searchInput').value = 'London';
        });
    </script>
</body>
</html>
